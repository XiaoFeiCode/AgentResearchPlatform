services:
  db:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: sentinelai-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-media_crawler}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_EXPOSE_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-123456}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sentinelai-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/docs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "${PORT:-5000}:5000"
    environment:
      # Server (hardcoded for Docker)
      - HOST=0.0.0.0
      - PORT=5000
      # Database (hardcoded for Docker — MySQL service)
      - DB_DIALECT=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - DB_NAME=${DB_NAME:-media_crawler}
      - DB_CHARSET=${DB_CHARSET:-utf8mb4}
      # Insight Engine (Kimi K2)
      - INSIGHT_ENGINE_API_KEY=${INSIGHT_ENGINE_API_KEY:-}
      - INSIGHT_ENGINE_BASE_URL=${INSIGHT_ENGINE_BASE_URL:-https://api.moonshot.cn/v1}
      - INSIGHT_ENGINE_MODEL_NAME=${INSIGHT_ENGINE_MODEL_NAME:-kimi-k2-0711-preview}
      # Media Engine (Gemini 2.5 Pro)
      - MEDIA_ENGINE_API_KEY=${MEDIA_ENGINE_API_KEY:-}
      - MEDIA_ENGINE_BASE_URL=${MEDIA_ENGINE_BASE_URL:-https://aihubmix.com/v1}
      - MEDIA_ENGINE_MODEL_NAME=${MEDIA_ENGINE_MODEL_NAME:-gemini-2.5-pro}
      # Query Engine (DeepSeek)
      - QUERY_ENGINE_API_KEY=${QUERY_ENGINE_API_KEY:-}
      - QUERY_ENGINE_BASE_URL=${QUERY_ENGINE_BASE_URL:-https://api.deepseek.com}
      - QUERY_ENGINE_MODEL_NAME=${QUERY_ENGINE_MODEL_NAME:-deepseek-chat}
      # Report Engine (Gemini 2.5 Pro)
      - REPORT_ENGINE_API_KEY=${REPORT_ENGINE_API_KEY:-}
      - REPORT_ENGINE_BASE_URL=${REPORT_ENGINE_BASE_URL:-https://aihubmix.com/v1}
      - REPORT_ENGINE_MODEL_NAME=${REPORT_ENGINE_MODEL_NAME:-gemini-2.5-pro}
      # SentinelSpider Agent
      - SENTINEL_SPIDER_API_KEY=${SENTINEL_SPIDER_API_KEY:-}
      - SENTINEL_SPIDER_BASE_URL=${SENTINEL_SPIDER_BASE_URL:-}
      - SENTINEL_SPIDER_MODEL_NAME=${SENTINEL_SPIDER_MODEL_NAME:-}
      # Forum Host (Qwen3)
      - FORUM_HOST_API_KEY=${FORUM_HOST_API_KEY:-}
      - FORUM_HOST_BASE_URL=${FORUM_HOST_BASE_URL:-}
      - FORUM_HOST_MODEL_NAME=${FORUM_HOST_MODEL_NAME:-}
      # Keyword Optimizer (Qwen3)
      - KEYWORD_OPTIMIZER_API_KEY=${KEYWORD_OPTIMIZER_API_KEY:-}
      - KEYWORD_OPTIMIZER_BASE_URL=${KEYWORD_OPTIMIZER_BASE_URL:-}
      - KEYWORD_OPTIMIZER_MODEL_NAME=${KEYWORD_OPTIMIZER_MODEL_NAME:-}
      # Search Tools
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - SEARCH_TOOL_TYPE=${SEARCH_TOOL_TYPE:-TavilyAPI}
      - BOCHA_BASE_URL=${BOCHA_BASE_URL:-https://api.bocha.cn/v1/ai-search}
      - BOCHA_WEB_SEARCH_API_KEY=${BOCHA_WEB_SEARCH_API_KEY:-}
      - BOCHA_API_KEY=${BOCHA_API_KEY:-}
      - ANSPIRE_BASE_URL=${ANSPIRE_BASE_URL:-https://plugin.anspire.cn/api/ntsearch/search}
      - ANSPIRE_API_KEY=${ANSPIRE_API_KEY:-}
      # Insight search and optional local ML features
      - ENABLE_CLUSTERING=${ENABLE_CLUSTERING:-true}
      - MAX_CLUSTERED_RESULTS=${MAX_CLUSTERED_RESULTS:-50}
      - RESULTS_PER_CLUSTER=${RESULTS_PER_CLUSTER:-5}
      - SENTIMENT_ANALYSIS_ENABLED=${SENTIMENT_ANALYSIS_ENABLED:-false}
      - ENABLE_SENTIMENT_PER_SEARCH=${ENABLE_SENTIMENT_PER_SEARCH:-false}
      - SENTIMENT_MODEL_NAME=${SENTIMENT_MODEL_NAME:-tabularisai/multilingual-sentiment-analysis}
      - CLUSTERING_MODEL_NAME=${CLUSTERING_MODEL_NAME:-paraphrase-multilingual-MiniLM-L12-v2}
      - MAX_REFLECTIONS=${MAX_REFLECTIONS:-3}
      - MAX_PARAGRAPHS=${MAX_PARAGRAPHS:-6}
      - SEARCH_TIMEOUT=${SEARCH_TIMEOUT:-240}
      - MAX_CONTENT_LENGTH=${MAX_CONTENT_LENGTH:-500000}
      - SEARCH_CONTENT_MAX_LENGTH=${SEARCH_CONTENT_MAX_LENGTH:-500000}
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sentinelai-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql_data:
  app_data:
  app_logs:
